<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicare National Enrollment Trends</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 40px;
            background-color: #f8f9fa;
        }
        h2 { color: #2c3e50; }
        .table-container { overflow-x: auto; margin-top: 20px; }
        table {
            border-collapse: collapse;
            width: 100%;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-radius: 8px;
            overflow: hidden;
        }
        th, td { padding: 12px 15px; text-align: right; }
        th:first-child, td:first-child { text-align: left; font-weight: bold; }
        th {
            background-color: #34495e;
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        tr:nth-child(even) { background-color: #f2f4f4; }
        tr:hover { background-color: #eaeded; }
        td { border-bottom: 1px solid #e2e8f0; color: #2c3e50; }
        .pct { color: #7f8c8d; font-size: 0.9rem; margin-left: 5px; }
    </style>
</head>
<body>

    <h2>Medicare National Enrollment Trends (2018 - 2026)</h2>
    <div class="table-container" id="medicare-table"></div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="app.js" type="module"></script>
</body>
</html>
