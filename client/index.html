<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medicare Monthly Enrollment Dashboard</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- National Enrollment Trends -->
    <section id="national">
      <h2>Medicare National Enrollment Trends (2018 - 2026)</h2>
      <div class="table-container" id="medicare-table"></div>
    </section>

    <!-- State Enrollment Grids -->
    <section id="state">
      <h2>State Enrollment — Hospital / Medical</h2>
      <h3>Yearly Trend</h3>
      <div class="table-container" id="state-hospital-yearly"></div>

      <h3>12-Month Trend</h3>
      <div class="table-container" id="state-hospital-monthly"></div>

      <h2>State Enrollment — Prescription Drug</h2>
      <h3>Yearly Trend</h3>
      <div class="table-container" id="state-drug-yearly"></div>

      <h3>12-Month Trend</h3>
      <div class="table-container" id="state-drug-monthly"></div>
    </section>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script type="module" src="app.js"></script>
    <script type="module" src="stateGrids.js"></script>
  </body>
</html>
